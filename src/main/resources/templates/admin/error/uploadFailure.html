<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/layout3}">

<th:block layout:fragment="content">
	<div class="section" data-aos="fade-up" data-aos-delay="200">
		<div class="section-body">
			
			<div class="row justify-content-center" data-aos="fade-up" data-aos-delay="200">
				<div class="col-md-5">
					<div class="bg-white box-shadow mt-5 mb-5 p-5">
						<h3 class="text-center pt-3">파일 업로드 실패</h3>
						<hr class="mt-4">
						
						<div class="my-5">
							<div class="text-center">
								<p class="text-center">
									<strong>파일을 업로드할 수 없습니다.</strong><br>
									파일의 용량이 초과 했거나 권한이 불충분합니다.
								</p>
							</div>
						</div>
	                    
						<div>
							<button type="button" class="btn-accent btn-lg w-100" onclick="javascript:history.back();">
								이전화면으로 이동
							</button>
						</div>
					</div>
				</div>
			</div>

		</div>
	</div>
</th:block>

</html>
