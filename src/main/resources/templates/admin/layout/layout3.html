<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
				xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spring</title>
<!-- Favicons -->
<link th:href="@{/dist/images/h.png}" rel="icon">
  
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  
<!-- Vendor CSS Files -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- Core CSS Files -->
<link rel="stylesheet" th:href="@{/dist/css/core.css}" type="text/css">
<!-- Main CSS Files -->
<link rel="stylesheet" th:href="@{/dist/css/main2.css}" type="text/css">
<!-- Form CSS Files -->
<link rel="stylesheet" th:href="@{/dist/css/forms.css}" type="text/css">

<!-- 각 페이지의 css가 작성될 위치 -->
<th:block layout:fragment="css"></th:block>
	
<!-- Vendor JS Files -->
<script type="text/javascript" th:src="@{/dist/vendor/jquery/js/jquery.min.js}"></script>

<script type="text/javascript" th:src="@{/dist/js/util-jquery.js}"></script>
</head>
<body>

<header>
	<th:block th:replace="~{admin/layout/header::header}"></th:block>
</header>

<main class="main-container">
	<th:block th:replace="~{admin/layout/left::leftMenu}"></th:block> 
	<div class="right-panel">
		<div layout:fragment="content"></div>
	</div>
</main>

<!-- Preloader -->
<div id="preloader"></div>
<div id="loadingLayout"></div>

<!-- Vendor JS Files -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>	
<script type="text/javascript" src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<!-- Core JS Files -->
<script type="text/javascript" th:src="@{/dist/js/core2.js}"></script>

<!-- 각 페이지의 스크립트가 작성될 위치 -->
<th:block layout:fragment="script"></th:block>	

</body>
</html>
